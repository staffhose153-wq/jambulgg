<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean Glow Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(0, 255, 255, 0.22), transparent 35%),
        radial-gradient(circle at bottom, rgba(153, 0, 255, 0.22), transparent 35%),
        linear-gradient(135deg, #050816, #090d1f, #02040a);
      color: #fff;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 420px;
      height: 420px;
      background: #00eaff;
      filter: blur(160px);
      opacity: 0.25;
      border-radius: 50%;
      top: -120px;
      left: -100px;
      animation: floatGlow 6s ease-in-out infinite alternate;
    }

    .bg-glow:nth-child(2) {
      background: #b300ff;
      top: auto;
      left: auto;
      bottom: -140px;
      right: -100px;
      animation-delay: 1.5s;
    }

    @keyframes floatGlow {
      from {
        transform: translateY(0) scale(1);
      }
      to {
        transform: translateY(35px) scale(1.08);
      }
    }

    .container {
      position: relative;
      width: 92%;
      max-width: 520px;
      padding: 38px 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        0 0 35px rgba(0, 234, 255, 0.18),
        inset 0 0 25px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(18px);
      text-align: center;
      z-index: 2;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      margin-bottom: 18px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 1px;
      color: #9ff8ff;
      background: rgba(0, 234, 255, 0.08);
      border: 1px solid rgba(0, 234, 255, 0.28);
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.18);
    }

    h1 {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ffffff, #8ff7ff, #d9a7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .button-list {
      display: grid;
      gap: 15px;
    }

    .glow-btn {
      position: relative;
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      overflow: hidden;
      transition: 0.35s ease;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
    }

    .glow-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      left: -100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255, 255, 255, 0.35),
        transparent
      );
      transition: 0.55s ease;
    }

    .glow-btn:hover::before {
      left: 100%;
    }

    .glow-btn:hover {
      transform: translateY(-4px) scale(1.015);
      border-color: rgba(0, 234, 255, 0.6);
      box-shadow:
        0 0 18px rgba(0, 234, 255, 0.45),
        0 0 38px rgba(179, 0, 255, 0.22);
    }

    .glow-btn span {
      position: relative;
      z-index: 1;
    }

    .btn-1:hover {
      background: rgba(0, 234, 255, 0.18);
    }

    .btn-2:hover {
      background: rgba(153, 0, 255, 0.18);
    }

    .btn-3:hover {
      background: rgba(255, 193, 7, 0.18);
      border-color: rgba(255, 193, 7, 0.7);
      box-shadow: 0 0 24px rgba(255, 193, 7, 0.38);
    }

    .btn-4:hover {
      background: rgba(34, 197, 94, 0.18);
      border-color: rgba(34, 197, 94, 0.7);
      box-shadow: 0 0 24px rgba(34, 197, 94, 0.38);
    }

    .btn-5:hover {
      background: rgba(244, 63, 94, 0.18);
      border-color: rgba(244, 63, 94, 0.7);
      box-shadow: 0 0 24px rgba(244, 63, 94, 0.38);
    }

    .footer-text {
      margin-top: 26px;
      font-size: 12px;
      color: #94a3b8;
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 22px;
      }

      h1 {
        font-size: 28px;
      }

      .glow-btn {
        padding: 15px 16px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>
  <div class="bg-glow"></div>

  <main class="container">
    <div class="badge">CLEAN GLOW DESIGN</div>

    <h1>Menu Utama</h1>
    <p>
      Pilih salah satu menu di bawah ini. Tampilan dibuat clean, ringan,
      modern, dan memiliki efek glow yang elegan.
    </p>

    <div class="button-list">
      <button class="glow-btn btn-1" onclick="openMenu('Dashboard')">
        <span>Dashboard</span>
      </button>

      <button class="glow-btn btn-2" onclick="openMenu('Data Kerja')">
        <span>Data Kerja</span>
      </button>

      <button class="glow-btn btn-3" onclick="openMenu('Laporan')">
        <span>Laporan</span>
      </button>

      <button class="glow-btn btn-4" onclick="openMenu('Pengaturan')">
        <span>Pengaturan</span>
      </button>

      <button class="glow-btn btn-5" onclick="openMenu('Logout')">
        <span>Logout</span>
      </button>
    </div>

    <div class="footer-text">
      © 2026 Clean Glow System
    </div>
  </main>

  <script>
    function openMenu(menuName) {
      alert("Anda membuka menu: " + menuName);
    }
  </script>

</body>
</html>
